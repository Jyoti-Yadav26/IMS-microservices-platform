spring:
  datasource:
    url: jdbc:h2:mem:inventory_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

eureka:
  client:
    enabled: false
