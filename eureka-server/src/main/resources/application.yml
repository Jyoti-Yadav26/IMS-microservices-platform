server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # This node is a registry itself, it doesn't need to register with / fetch from itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disabling self-preservation is fine for a local/dev single-node setup;
    # in a real multi-node prod deployment this should stay enabled.
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
