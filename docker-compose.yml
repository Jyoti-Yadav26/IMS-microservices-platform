name: ims

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # cub zk-ready is bundled in the Confluent image; nc-based checks are flaky on Windows Docker
      test: ["CMD", "bash", "-c", "cub zk-ready localhost:2181 10"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092" # host access, e.g. a local kafka console consumer
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
    ports:
      - "5432:5432"
    volumes:
      - inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
    ports:
      - "5433:5432"
    volumes:
      - order_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
    ports:
      - "5434:5432"
    volumes:
      - notification_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Platform
  # ---------------------------------------------------------------------------

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/

  # ---------------------------------------------------------------------------
  # Business services
  # ---------------------------------------------------------------------------

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-inventory
      DB_PORT: 5432
      DB_NAME: inventory_db
      DB_USER: ims
      DB_PASSWORD: ims
      KAFKA_BROKER: kafka:29092
      EUREKA_URI: http://eureka-server:8761/eureka/

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      inventory-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-order
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: ims
      DB_PASSWORD: ims
      KAFKA_BROKER: kafka:29092
      EUREKA_URI: http://eureka-server:8761/eureka/
      SPRING_CLOUD_OPENFEIGN_CIRCUITBREAKER_ENABLED: ${FEIGN_CB_ENABLED:-true}

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-notification
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: ims
      DB_PASSWORD: ims
      KAFKA_BROKER: kafka:29092
      EUREKA_URI: http://eureka-server:8761/eureka/

volumes:
  inventory_pgdata:
  order_pgdata:
  notification_pgdata:
